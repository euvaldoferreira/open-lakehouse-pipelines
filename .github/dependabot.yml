version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      ci-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "bandit"
          - "pip-audit"
          - "nbstripout"
          - "requests-mock"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
