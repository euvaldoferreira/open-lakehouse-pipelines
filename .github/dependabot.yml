version: 2
updates:
  # ---------------------------------------------------------------------------
  # Ferramentas de CI (requirements-ci.txt) — todas as atualizações permitidas
  # apache-airflow bloqueado em minor/patch: versão deve ser alinhada
  # com a imagem Docker em lakehouse-infra
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "apache-airflow"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      ci-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "bandit"
          - "pip-audit"
          - "nbstripout"
          - "requests-mock"

  # ---------------------------------------------------------------------------
  # GitHub Actions — todas as atualizações permitidas
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
