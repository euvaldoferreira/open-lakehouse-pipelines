name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**", "fix/**"]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint — ruff em dags/ e plugins/
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt
      - run: ruff check dags/ plugins/

  # ---------------------------------------------------------------------------
  # 2. Validação de DAGs — sintaxe e compilação Python
  # ---------------------------------------------------------------------------
  validate-dags:
    name: Validate DAGs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (py_compile)
        run: |
          find dags -name "*.py" | while read f; do
            python -m py_compile "$f" && echo "OK: $f"
          done

  # ---------------------------------------------------------------------------
  # 3. Testes unitários + cobertura mínima de plugins/
  # ---------------------------------------------------------------------------
  test-plugins:
    name: Test Plugins (coverage ≥ 70%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install apache-airflow==2.9.1 \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.1/constraints-3.11.txt"
          pip install -r requirements-ci.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=operators \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # 4. Notebooks — verifica que nenhum output foi commitado
  # ---------------------------------------------------------------------------
  check-notebooks:
    name: Check Notebook Outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Check no outputs committed
        run: |
          fail=0
          find notebooks tutorials -name "*.ipynb" 2>/dev/null | while read nb; do
            if ! nbstripout --check "$nb"; then
              echo "FAIL: $nb contém outputs — execute nbstripout antes do commit"
              fail=1
            else
              echo "OK: $nb"
            fi
          done
          exit $fail

  # ---------------------------------------------------------------------------
  # 5. Auditoria de dependências — CVEs conhecidos (pip-audit)
  #    Escopo: requirements-ci.txt (ferramentas de CI/CD).
  #    O Airflow e seus providers são auditados em lakehouse-infra,
  #    pois são dependências de runtime de infra, não de código.
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Audit dependencies
        run: pip-audit -r requirements-ci.txt

  # ---------------------------------------------------------------------------
  # 6. SAST — análise estática de segurança (bandit)
  #    Threshold: somente severidade MEDIUM e acima (-ll)
  #    Falsos positivos comuns em data engineering já configurados em pyproject.toml
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Run bandit
        run: bandit -r plugins/ dags/ -ll -c pyproject.toml
