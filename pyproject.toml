[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = [
    "E501",  # line too long — não bloqueante em DAGs/notebooks
]

[tool.ruff.lint.per-file-ignores]
"dags/**/*.py" = ["E402"]  # imports após constantes de configuração — padrão Airflow

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["plugins"]

[tool.bandit]
# Falsos positivos comuns em projetos de data engineering:
# B101 — assert em testes e validações de dados
# B603 — subprocess sem shell=True (submissão de jobs Spark)
# B607 — caminho parcial em start_process (comandos externos de processamento)
skips = [
    "B101",  # assert — comum em validações de dados
    "B603",  # subprocess sem shell=True — submissão de jobs Spark
    "B607",  # caminho parcial em start_process — comandos externos de processamento
    "B608",  # spark.sql(f"...") — parâmetros vêm do Airflow, não de input de usuário
]
